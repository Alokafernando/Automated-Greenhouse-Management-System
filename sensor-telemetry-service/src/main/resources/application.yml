server:
  port: 8082

spring:
  application:
    name: sensor-service
  config:
    import: "optional:configserver:http://localhost:8888"
  jackson:
    serialization:
      write-dates-as-timestamps: false
  main:
    allow-bean-definition-overriding: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true

# External IoT API Credentials
external:
  iot:
    base-url: http://104.211.95.241:8080/api
    username: root
    password: 1234

# Logic settings
telemetry:
  fetch-interval: 10000

# Logging level
logging:
  level:
    com.agms.sensor_telemetry_service: DEBUG